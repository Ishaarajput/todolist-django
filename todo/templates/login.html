<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
    font-family:Arial;
    background:#f5f7fa;
}

.container{
    width:400px;
    margin:120px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:12px 25px;
    background:#2196F3;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

a{
    text-decoration:none;
}

</style>

</head>


<body>

<div class="container">

<h2>Login</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="username" autocomplete="off" required>
<input type="password" name="password" autocomplete="off" required>
<br>

<button type="submit">Login</button>

</form>

<p>Don't have an account?</p>

<a href="{% url 'register' %}">Register</a>

</div>

</body>
</html>
