<!DOCTYPE html>
<html>
<head>
<title>Todo App</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#f5f7fa;
}

/* NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#4CAF50;
    padding:15px 40px;
    color:white;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:16px;
}

/* MAIN SECTION */

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.card{
    background:white;
    padding:50px;
    border-radius:10px;
    text-align:center;
    width:400px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

.card h1{
    margin-bottom:10px;
}

.card p{
    color:#666;
    margin-bottom:30px;
}

/* BUTTONS */

.btn{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.login{
    background:#4CAF50;
    color:white;
}

.register{
    background:#2196F3;
    color:white;
}

</style>

</head>


<body>

<!-- NAVBAR -->

<div class="navbar">

<div>
<b>TodoApp</b>
</div>

<div>
<a href="{% url 'login' %}">Login</a>
<a href="{%url 'register' %}">Register</a>
</div>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<div class="card">

<h1>Welcome to Todo App</h1>

<p>Manage your daily tasks easily and stay organized.</p>

<a href="{% url 'login' %}">
<button class="btn login">Login</button>
</a>

<a href="{% url 'register' %}">
<button class="btn register">Register</button>
</a>

</div>

</div>

</body>
</html>
